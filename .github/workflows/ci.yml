name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: fmt + clippy + test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies for gpui (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config build-essential \
            libxkbcommon-dev libwayland-dev libvulkan-dev \
            libxcb1-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libssl-dev

      - name: Install Rust toolchain (pinned by rust-toolchain.toml)
        run: rustup show

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml', 'rust-toolchain.toml') }}

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace
